backend:
  name: github
  repo: Kiwi-2025/Kiwi-2025.github.io
  branch: main

media_folder: public/images
public_folder: /images

collections:
  - name: blog
    label: Blog
    label_singular: Post
    folder: src/content/blog
    create: true
    slug: "{{slug}}"
    extension: md
    format: frontmatter
    fields:
      - name: title
        label: Title
        widget: string
      - name: date
        label: Date
        widget: datetime
        format: "YYYY-MM-DD HH:mm:ss"
      - name: description
        label: Description
        widget: text
        required: false
      - name: categories
        label: Categories
        widget: list
        required: false
      - name: tags
        label: Tags
        widget: list
        required: false
      - name: draft
        label: Draft
        widget: boolean
        default: false
        required: false
      - name: body
        label: Body
        widget: markdown
