backend:
  name: github
  repo: Kiwi-2025/Kiwi-2025.github.io
  branch: main

media_folder: public/images
public_folder: /images

collections:
  - name: blog
    label: Blog
    label_singular: Post
    folder: src/content/blog
    create: true
    slug: "{{slug}}"
    extension: md
    format: frontmatter
    fields:
      - name: title
        label: Title
        widget: string
      - name: date
        label: Date
        widget: datetime
        format: "YYYY-MM-DD HH:mm:ss"
      - name: description
        label: Description
        widget: text
        required: false
      - name: categories
        label: Categories
        widget: select
        multiple: true
        options:
          - Notes
          - 生活
          - 机器人学
          - 光学
          - 软件开发
          - 工程笔记
          - 数学
          - 读书笔记
          - 随笔
        required: false
      - name: tags
        label: Tags
        widget: select
        multiple: true
        options:
          - Optics
          - history
          - 杂碎知识
          - Robotics
          - Astro
          - Markdown
          - GitHub Pages
          - 编程
          - 公式
          - 实验
          - 项目记录
          - 读书
        required: false
      - name: featured
        label: Featured
        widget: boolean
        default: false
        required: false
      - name: draft
        label: Draft
        widget: boolean
        default: false
        required: false
      - name: body
        label: Body
        widget: markdown
