backend:
  name: github
  repo: Kiwi-2025/Kiwi-2025.github.io
  branch: main

media_folder: public/images
public_folder: /images

collections:
  - name: blog
    label: Blog
    label_singular: Post
    folder: src/content/blog
    create: true
    slug: "{{slug}}"
    extension: md
    format: frontmatter
    fields:
      - name: title
        label: Title
        widget: string
      - name: date
        label: Date
        widget: datetime
        format: "YYYY-MM-DD HH:mm:ss"
      - name: description
        label: Description
        widget: text
        required: false
        hint: Published posts require a description.
      - name: updatedDate
        label: Updated Date
        widget: datetime
        format: "YYYY-MM-DD HH:mm:ss"
        required: false
      - name: categories
        label: Categories
        widget: select
        multiple: true
        options:
          - Notes
          - 生活
          - 机器人学
          - 光学
          - 软件开发
          - 工程笔记
          - 数学
          - 读书笔记
          - 随笔
        required: false
      - name: tags
        label: Tags
        widget: select
        multiple: true
        options:
          - Optics
          - history
          - 杂碎知识
          - Robotics
          - Astro
          - Markdown
          - GitHub Pages
          - 编程
          - 公式
          - 实验
          - 项目记录
          - 读书
        required: false
      - name: featured
        label: Featured
        widget: boolean
        default: false
        required: false
      - name: series
        label: Series
        widget: string
        required: false
      - name: canonicalUrl
        label: Canonical URL
        widget: string
        required: false
        pattern:
          - "^https://.+"
          - Must be a complete HTTPS URL
      - name: milestones
        label: Milestones
        widget: list
        required: false
        summary: "{{fields.date}} — {{fields.text}}"
        fields:
          - name: date
            label: Date
            widget: datetime
            format: "YYYY-MM-DD"
            time_format: false
          - name: text
            label: Text
            widget: string
      - name: draft
        label: Draft
        widget: boolean
        default: false
        required: false
      - name: body
        label: Body
        widget: markdown
        hint: Start body headings at H2; the page layout supplies the H1 title.
